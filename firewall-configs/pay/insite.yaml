application:
  trigram: PAY
  name: Payments
  tier: finance
firewall:
  policy_set: pay-default
  default_action: deny
  rules:
    - name: allow-primary
      source: PAY_internet
      destination: PAY_payments-api
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 8443
      action: allow
      priority: 840
      enabled: true
    - name: allow-ops
      source: PAY_corp-admin
      destination: PAY_payments-api
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 841
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: PAY_payments-api
      direction: ingress
      protocol: tcp
      ports:
        - 9104
      action: allow
      priority: 842
      enabled: true
    - name: allow-egress-service
      source: PAY_payments-api
      destination: PAY_audit-ledger
      direction: egress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 843
      enabled: true
    - name: allow-sync
      source: PAY_integration-bus
      destination: PAY_payments-api
      direction: egress
      protocol: tcp
      ports:
        - 4317
      action: allow
      priority: 844
      enabled: true
    - name: allow-trigram-peer
      source: PDF_pdf-renderer
      destination: PAY_payments
      direction: ingress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 845
      enabled: true
    - name: allow-outbound-trigram
      source: PAY_payments
      destination: PDF_pdf-renderer
      direction: egress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 846
      enabled: true
    - name: deny-trigram-peer
      source: EDI_edi-gateway
      destination: PAY_payments
      direction: ingress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 847
      enabled: true
    - name: deny-outbound-trigram
      source: PAY_payments
      destination: EDI_edi-gateway
      direction: egress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 848
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: PAY_payments-api
      direction: ingress
      protocol: any
      ports:
        - 23/tcp
      action: deny
      priority: 849
      enabled: true
