application:
  trigram: SDP
  name: Service Desk
  tier: corp
firewall:
  policy_set: sdp-default
  default_action: deny
  rules:
    - name: allow-primary
      source: SDP_corp-users
      destination: SDP_service-desk
      direction: ingress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 1040
      enabled: true
    - name: allow-ops
      source: SDP_dev-vpn
      destination: SDP_service-desk
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 1041
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: SDP_service-desk
      direction: ingress
      protocol: tcp
      ports:
        - 9104
      action: allow
      priority: 1042
      enabled: true
    - name: allow-egress-service
      source: SDP_service-desk
      destination: SDP_shared-services
      direction: egress
      protocol: tcp
      ports:
        - 587
      action: allow
      priority: 1043
      enabled: true
    - name: allow-sync
      source: SDP_corp-services
      destination: SDP_service-desk
      direction: egress
      protocol: tcp
      ports:
        - 8200
      action: allow
      priority: 1044
      enabled: true
    - name: allow-trigram-peer
      source: SEC_security-hub
      destination: SDP_service-desk
      direction: ingress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 1045
      enabled: true
    - name: allow-outbound-trigram
      source: SDP_service-desk
      destination: SEC_security-hub
      direction: egress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 1046
      enabled: true
    - name: deny-trigram-peer
      source: IMG_image-service
      destination: SDP_service-desk
      direction: ingress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 1047
      enabled: true
    - name: deny-outbound-trigram
      source: SDP_service-desk
      destination: IMG_image-service
      direction: egress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 1048
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: SDP_service-desk
      direction: ingress
      protocol: any
      ports:
        - 25/tcp
      action: deny
      priority: 1049
      enabled: true
