application:
  trigram: INS
  name: Insights Engine
  tier: analytics
firewall:
  policy_set: ins-default
  default_action: deny
  rules:
    - name: allow-primary
      source: INS_analytics-vpc
      destination: INS_insight-cluster
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 9092
      action: allow
      priority: 560
      enabled: true
    - name: allow-ops
      source: INS_dev-vpn
      destination: INS_insight-cluster
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 561
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: INS_insight-cluster
      direction: ingress
      protocol: tcp
      ports:
        - 9101
      action: allow
      priority: 562
      enabled: true
    - name: allow-egress-service
      source: INS_insight-cluster
      destination: INS_lakehouse-bus
      direction: egress
      protocol: tcp
      ports:
        - 587
      action: allow
      priority: 563
      enabled: true
    - name: allow-sync
      source: INS_integration-bus
      destination: INS_insight-cluster
      direction: egress
      protocol: tcp
      ports:
        - 4317
      action: allow
      priority: 564
      enabled: true
    - name: allow-trigram-peer
      source: INV_inventory
      destination: INS_insights-engine
      direction: ingress
      protocol: tcp
      ports:
        - 8443
      action: allow
      priority: 565
      enabled: true
    - name: allow-outbound-trigram
      source: INS_insights-engine
      destination: INV_inventory
      direction: egress
      protocol: tcp
      ports:
        - 8443
      action: allow
      priority: 566
      enabled: true
    - name: deny-trigram-peer
      source: SEM_siem
      destination: INS_insights-engine
      direction: ingress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 567
      enabled: true
    - name: deny-outbound-trigram
      source: INS_insights-engine
      destination: SEM_siem
      direction: egress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 568
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: INS_insight-cluster
      direction: ingress
      protocol: any
      ports:
        - 80/tcp
      action: deny
      priority: 569
      enabled: true
