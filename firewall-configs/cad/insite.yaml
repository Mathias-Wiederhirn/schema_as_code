application:
  trigram: CAD
  name: Card Services
  tier: finance
firewall:
  policy_set: cad-default
  default_action: deny
  rules:
    - name: allow-primary
      source: CAD_payment-tier
      destination: CAD_card-core
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 1521
      action: allow
      priority: 180
      enabled: true
    - name: allow-ops
      source: CAD_corp-admin
      destination: CAD_card-core
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 181
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: CAD_card-core
      direction: ingress
      protocol: tcp
      ports:
        - 9103
      action: allow
      priority: 182
      enabled: true
    - name: allow-egress-service
      source: CAD_card-core
      destination: CAD_audit-ledger
      direction: egress
      protocol: udp
      ports:
        - 443
      action: allow
      priority: 183
      enabled: true
    - name: allow-sync
      source: CAD_integration-bus
      destination: CAD_card-core
      direction: egress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 184
      enabled: false
    - name: allow-trigram-peer
      source: CAS_case-tracking
      destination: CAD_card-services
      direction: ingress
      protocol: tcp
      ports:
        - 5672
      action: allow
      priority: 185
      enabled: true
    - name: allow-outbound-trigram
      source: CAD_card-services
      destination: CAS_case-tracking
      direction: egress
      protocol: tcp
      ports:
        - 5672
      action: allow
      priority: 186
      enabled: true
    - name: deny-trigram-peer
      source: MAI_mail-api
      destination: CAD_card-services
      direction: ingress
      protocol: tcp
      ports:
        - 3306
      action: deny
      priority: 187
      enabled: true
    - name: deny-outbound-trigram
      source: CAD_card-services
      destination: MAI_mail-api
      direction: egress
      protocol: tcp
      ports:
        - 3306
      action: deny
      priority: 188
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: CAD_card-core
      direction: ingress
      protocol: any
      ports:
        - 5900/tcp
      action: deny
      priority: 189
      enabled: true
