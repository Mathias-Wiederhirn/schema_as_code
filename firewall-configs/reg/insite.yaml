application:
  trigram: REG
  name: Registry
  tier: devops
firewall:
  policy_set: reg-default
  default_action: deny
  rules:
    - name: allow-primary
      source: REG_dev-vpn
      destination: REG_container-registry
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 5000
      action: allow
      priority: 970
      enabled: true
    - name: allow-ops
      source: REG_ops-admin
      destination: REG_container-registry
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 971
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: REG_container-registry
      direction: ingress
      protocol: tcp
      ports:
        - 9102
      action: allow
      priority: 972
      enabled: true
    - name: allow-egress-service
      source: REG_container-registry
      destination: REG_shared-services
      direction: egress
      protocol: tcp
      ports:
        - 514
      action: allow
      priority: 973
      enabled: true
    - name: allow-sync
      source: REG_integration-bus
      destination: REG_container-registry
      direction: ingress
      protocol: tcp
      ports:
        - 8200
      action: allow
      priority: 974
      enabled: true
    - name: allow-trigram-peer
      source: REC_recommendation
      destination: REG_registry
      direction: ingress
      protocol: tcp
      ports:
        - 5432
      action: allow
      priority: 975
      enabled: true
    - name: allow-outbound-trigram
      source: REG_registry
      destination: REC_recommendation
      direction: egress
      protocol: tcp
      ports:
        - 5432
      action: allow
      priority: 976
      enabled: true
    - name: deny-trigram-peer
      source: GOV_governance-api
      destination: REG_registry
      direction: ingress
      protocol: tcp
      ports:
        - 25
      action: deny
      priority: 977
      enabled: true
    - name: deny-outbound-trigram
      source: REG_registry
      destination: GOV_governance-api
      direction: egress
      protocol: tcp
      ports:
        - 25
      action: deny
      priority: 978
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: REG_container-registry
      direction: ingress
      protocol: any
      ports:
        - 80/tcp
      action: deny
      priority: 979
      enabled: true
