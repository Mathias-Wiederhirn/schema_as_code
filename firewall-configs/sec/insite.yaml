application:
  trigram: SEC
  name: Security Hub
  tier: security
firewall:
  policy_set: sec-default
  default_action: deny
  rules:
    - name: allow-primary
      source: SEC_ops-admin
      destination: SEC_security-hub
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 9443
      action: allow
      priority: 1050
      enabled: true
    - name: allow-ops
      source: SEC_corp-admin
      destination: SEC_security-hub
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 1051
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: SEC_security-hub
      direction: ingress
      protocol: tcp
      ports:
        - 9100
      action: allow
      priority: 1052
      enabled: true
    - name: allow-egress-service
      source: SEC_security-hub
      destination: SEC_siem-core
      direction: egress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 1053
      enabled: true
    - name: allow-sync
      source: SEC_integration-bus
      destination: SEC_security-hub
      direction: ingress
      protocol: udp
      ports:
        - 4317
      action: allow
      priority: 1054
      enabled: true
    - name: allow-trigram-peer
      source: SDP_service-desk
      destination: SEC_security-hub
      direction: ingress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 1055
      enabled: true
    - name: allow-outbound-trigram
      source: SEC_security-hub
      destination: SDP_service-desk
      direction: egress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 1056
      enabled: true
    - name: deny-trigram-peer
      source: IMP_import-pipeline
      destination: SEC_security-hub
      direction: ingress
      protocol: tcp
      ports:
        - 25
      action: deny
      priority: 1057
      enabled: true
    - name: deny-outbound-trigram
      source: SEC_security-hub
      destination: IMP_import-pipeline
      direction: egress
      protocol: tcp
      ports:
        - 25
      action: deny
      priority: 1058
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: SEC_security-hub
      direction: ingress
      protocol: any
      ports:
        - 80/tcp
      action: deny
      priority: 1059
      enabled: true
