application:
  trigram: FED
  name: Federation Hub
  tier: identity
firewall:
  policy_set: fed-default
  default_action: deny
  rules:
    - name: allow-primary
      source: FED_partners
      destination: FED_federation-hub
      direction: ingress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 410
      enabled: true
    - name: allow-ops
      source: FED_dev-vpn
      destination: FED_federation-hub
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 411
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: FED_federation-hub
      direction: ingress
      protocol: tcp
      ports:
        - 9101
      action: allow
      priority: 412
      enabled: true
    - name: allow-egress-service
      source: FED_federation-hub
      destination: FED_directory-core
      direction: egress
      protocol: tcp
      ports:
        - 123
      action: allow
      priority: 413
      enabled: true
    - name: allow-sync
      source: FED_integration-bus
      destination: FED_federation-hub
      direction: ingress
      protocol: tcp
      ports:
        - 8200
      action: allow
      priority: 414
      enabled: true
    - name: allow-trigram-peer
      source: EXP_export-service
      destination: FED_federation-hub
      direction: ingress
      protocol: tcp
      ports:
        - 8443
      action: allow
      priority: 415
      enabled: true
    - name: allow-outbound-trigram
      source: FED_federation-hub
      destination: EXP_export-service
      direction: egress
      protocol: tcp
      ports:
        - 8443
      action: allow
      priority: 416
      enabled: true
    - name: deny-trigram-peer
      source: PRX_proxy-fleet
      destination: FED_federation-hub
      direction: ingress
      protocol: tcp
      ports:
        - 25
      action: deny
      priority: 417
      enabled: true
    - name: deny-outbound-trigram
      source: FED_federation-hub
      destination: PRX_proxy-fleet
      direction: egress
      protocol: tcp
      ports:
        - 25
      action: deny
      priority: 418
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: FED_federation-hub
      direction: ingress
      protocol: any
      ports:
        - 23/tcp
      action: deny
      priority: 419
      enabled: true
