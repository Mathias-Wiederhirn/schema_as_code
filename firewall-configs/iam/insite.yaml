application:
  trigram: IAM
  name: Identity Access
  tier: identity
firewall:
  policy_set: iam-default
  default_action: deny
  rules:
    - name: allow-primary
      source: IAM_corp-users
      destination: IAM_iam-core
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 636
      action: allow
      priority: 520
      enabled: true
    - name: allow-ops
      source: IAM_ops-admin
      destination: IAM_iam-core
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 521
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: IAM_iam-core
      direction: ingress
      protocol: tcp
      ports:
        - 9102
      action: allow
      priority: 522
      enabled: true
    - name: allow-egress-service
      source: IAM_iam-core
      destination: IAM_directory-core
      direction: egress
      protocol: tcp
      ports:
        - 53
      action: allow
      priority: 523
      enabled: true
    - name: allow-sync
      source: IAM_integration-bus
      destination: IAM_iam-core
      direction: egress
      protocol: tcp
      ports:
        - 161
      action: allow
      priority: 524
      enabled: true
    - name: allow-trigram-peer
      source: IDS_intrusion-detection
      destination: IAM_identity-access
      direction: ingress
      protocol: tcp
      ports:
        - 5432
      action: allow
      priority: 525
      enabled: true
    - name: allow-outbound-trigram
      source: IAM_identity-access
      destination: IDS_intrusion-detection
      direction: egress
      protocol: tcp
      ports:
        - 5432
      action: allow
      priority: 526
      enabled: true
    - name: deny-trigram-peer
      source: SCH_scheduler
      destination: IAM_identity-access
      direction: ingress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 527
      enabled: true
    - name: deny-outbound-trigram
      source: IAM_identity-access
      destination: SCH_scheduler
      direction: egress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 528
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: IAM_iam-core
      direction: ingress
      protocol: any
      ports:
        - 25/tcp
      action: deny
      priority: 529
      enabled: true
