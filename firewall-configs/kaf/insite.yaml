application:
  trigram: KAF
  name: Kafka Cluster
  tier: stream
firewall:
  policy_set: kaf-default
  default_action: deny
  rules:
    - name: allow-primary
      source: KAF_analytics-vpc
      destination: KAF_kafka-brokers
      direction: ingress
      protocol: tcp
      ports:
        - 9092
        - 9093
      action: allow
      priority: 590
      enabled: true
    - name: allow-ops
      source: KAF_dev-vpn
      destination: KAF_kafka-brokers
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 591
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: KAF_kafka-brokers
      direction: ingress
      protocol: tcp
      ports:
        - 9104
      action: allow
      priority: 592
      enabled: true
    - name: allow-egress-service
      source: KAF_kafka-brokers
      destination: KAF_shared-services
      direction: egress
      protocol: tcp
      ports:
        - 123
      action: allow
      priority: 593
      enabled: true
    - name: allow-sync
      source: KAF_integration-bus
      destination: KAF_kafka-brokers
      direction: ingress
      protocol: tcp
      ports:
        - 161
      action: allow
      priority: 594
      enabled: true
    - name: allow-trigram-peer
      source: IOT_iot-hub
      destination: KAF_kafka-cluster
      direction: ingress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 595
      enabled: true
    - name: allow-outbound-trigram
      source: KAF_kafka-cluster
      destination: IOT_iot-hub
      direction: egress
      protocol: tcp
      ports:
        - 9092
      action: allow
      priority: 596
      enabled: true
    - name: deny-trigram-peer
      source: SOC_soc-console
      destination: KAF_kafka-cluster
      direction: ingress
      protocol: tcp
      ports:
        - 3389
      action: deny
      priority: 597
      enabled: true
    - name: deny-outbound-trigram
      source: KAF_kafka-cluster
      destination: SOC_soc-console
      direction: egress
      protocol: tcp
      ports:
        - 3389
      action: deny
      priority: 598
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: KAF_kafka-brokers
      direction: ingress
      protocol: any
      ports:
        - 25/tcp
      action: deny
      priority: 599
      enabled: true
