application:
  trigram: PLT
  name: Platform Core
  tier: platform
firewall:
  policy_set: plt-default
  default_action: deny
  rules:
    - name: allow-primary
      source: PLT_ops-admin
      destination: PLT_platform-core
      direction: ingress
      protocol: tcp
      ports:
        - 443
        - 6443
      action: allow
      priority: 880
      enabled: true
    - name: allow-ops
      source: PLT_ops-admin
      destination: PLT_platform-core
      direction: ingress
      protocol: tcp
      ports:
        - 22
        - 443
      action: allow
      priority: 881
      enabled: true
    - name: allow-observability
      source: MON_monitoring
      destination: PLT_platform-core
      direction: ingress
      protocol: tcp
      ports:
        - 9103
      action: allow
      priority: 882
      enabled: true
    - name: allow-egress-service
      source: PLT_platform-core
      destination: PLT_shared-services
      direction: egress
      protocol: tcp
      ports:
        - 53
      action: allow
      priority: 883
      enabled: true
    - name: allow-sync
      source: PLT_control-plane
      destination: PLT_platform-core
      direction: egress
      protocol: tcp
      ports:
        - 443
      action: allow
      priority: 884
      enabled: true
    - name: allow-trigram-peer
      source: PRC_pricing-engine
      destination: PLT_platform-core
      direction: ingress
      protocol: tcp
      ports:
        - 5672
      action: allow
      priority: 885
      enabled: true
    - name: allow-outbound-trigram
      source: PLT_platform-core
      destination: PRC_pricing-engine
      direction: egress
      protocol: tcp
      ports:
        - 5672
      action: allow
      priority: 886
      enabled: true
    - name: deny-trigram-peer
      source: ETL_etl-pipeline
      destination: PLT_platform-core
      direction: ingress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 887
      enabled: true
    - name: deny-outbound-trigram
      source: PLT_platform-core
      destination: ETL_etl-pipeline
      direction: egress
      protocol: tcp
      ports:
        - 22
      action: deny
      priority: 888
      enabled: true
    - name: deny-legacy
      source: ANY_any
      destination: PLT_platform-core
      direction: ingress
      protocol: any
      ports:
        - 23/tcp
      action: deny
      priority: 889
      enabled: true
